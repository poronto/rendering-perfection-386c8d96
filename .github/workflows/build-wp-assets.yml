name: Build WordPress Assets

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build assets for WordPress
        run: npx vite build --config vite.config.wp.ts

      - name: Prepare and commit assets
        run: |
          mkdir -p Assets
          cp wordpress-assets/Assets/index.js Assets/index.js
          # CSS may be named index.css or style.css
          find wordpress-assets/Assets -name "*.css" -exec cp {} Assets/index.css \;
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Assets/
          git diff --cached --quiet || git commit -m "Build: update WordPress assets"
          git push
