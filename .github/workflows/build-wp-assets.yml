name: Build WordPress Assets

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build assets
        run: npm run build

      - name: Upload WordPress assets
        uses: actions/upload-artifact@v4
        with:
          name: wordpress-assets
          path: |
            wordpress-assets/Assets/index.js
            wordpress-assets/Assets/index.css

      - name: Commit built assets to repo
        run: |
          mkdir -p Assets
          cp wordpress-assets/Assets/index.js Assets/index.js
          cp wordpress-assets/Assets/index.css Assets/index.css
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Assets/index.js Assets/index.css
          git diff --cached --quiet || git commit -m "Build: update WordPress assets"
          git push
